<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSM WK Quiz 2026 – Nieuw wachtwoord</title>
  <link rel="stylesheet" href="./css/style.css">
  <style>
    body {
      background: #f4f4f4; min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 20px;
    }
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0; height: 5px;
      background: linear-gradient(to right, #888b8d 12%, #3f9c35 35%, #009cde 60%);
      z-index: 200;
    }
    .reset-box {
      background: white; border-radius: 6px; padding: 36px 32px;
      width: 100%; max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      border-top: 4px solid #3f9c35;
    }
    .reset-box h2 { font-size: 20px; font-weight: bold; color: #1a1a1a; margin-bottom: 6px; }
    .reset-box p { font-size: 13px; color: #888b8d; margin-bottom: 24px; line-height: 1.6; }
    label {
      display: block; font-size: 11px; font-weight: bold;
      color: #888b8d; margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    input[type="password"] {
      width: 100%; font-size: 15px; padding: 11px 13px;
      border: 1.5px solid #d0d0d0; border-radius: 4px;
      font-family: Arial, sans-serif; box-sizing: border-box;
      margin-bottom: 14px; transition: 0.2s;
    }
    input:focus { border-color: #3f9c35; outline: none; }
    .btn-reset {
      width: 100%; padding: 12px; background: #3f9c35;
      color: white; border: none; border-radius: 4px;
      font-size: 14px; font-weight: bold; font-family: Arial, sans-serif;
      cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .btn-reset:hover { background: #337a2a; }
    .btn-reset:disabled { opacity: 0.6; cursor: not-allowed; }
    #error-msg {
      background: #fdecea; color: #c0392b; padding: 10px 13px;
      border-radius: 4px; font-size: 13px; margin-bottom: 14px;
      display: none; border-left: 4px solid #c0392b;
    }
    .success-box {
      text-align: center; padding: 22px; background: #e8f5e5;
      border-radius: 4px; border-left: 4px solid #3f9c35; display: none;
    }
    .success-box .icon { font-size: 36px; margin-bottom: 8px; }
    .success-box h3 { font-size: 16px; color: #1e5c18; font-weight: bold; }
  </style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="reset-box">
    <h2>Nieuw wachtwoord instellen</h2>
    <p>Kies een nieuw wachtwoord voor jouw account.</p>

    <div id="error-msg"></div>

    <div id="reset-form">
      <div class="form-group">
        <label>Nieuw wachtwoord</label>
        <input type="password" id="nieuw-wachtwoord" placeholder="Minimaal 6 tekens">
      </div>
      <div class="form-group">
        <label>Herhaal wachtwoord</label>
        <input type="password" id="herhaal-wachtwoord" placeholder="Zelfde wachtwoord opnieuw">
      </div>
      <button class="btn-reset" id="btn-reset" onclick="stelWachtwoordIn()">
        Wachtwoord opslaan
      </button>
    </div>

    <div class="success-box" id="success-box">
      <div class="icon">✅</div>
      <h3>Wachtwoord opgeslagen!</h3>
      <p style="color:#3f9c35;font-size:13px;margin-top:8px">Je wordt doorgestuurd naar de inlogpagina...</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js"></script>
  <script>
    async function stelWachtwoordIn() {
      const nieuw = document.getElementById('nieuw-wachtwoord').value;
      const herhaal = document.getElementById('herhaal-wachtwoord').value;
      const btn = document.getElementById('btn-reset');
      const errorEl = document.getElementById('error-msg');
      errorEl.style.display = 'none';

      if (!nieuw || nieuw.length < 6) {
        errorEl.textContent = '⚠️ Wachtwoord moet minstens 6 tekens zijn.';
        errorEl.style.display = 'block'; return;
      }
      if (nieuw !== herhaal) {
        errorEl.textContent = '⚠️ Wachtwoorden komen niet overeen.';
        errorEl.style.display = 'block'; return;
      }

      btn.disabled = true; btn.textContent = 'Opslaan...';

      const { error } = await db.auth.updateUser({ password: nieuw });

      if (error) {
        errorEl.textContent = '❌ ' + error.message;
        errorEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Wachtwoord opslaan'; return;
      }

      document.getElementById('reset-form').style.display = 'none';
      document.getElementById('success-box').style.display = 'block';
      setTimeout(() => window.location.href = '/rsm-wk-2026/index.html', 2500);
    }

    // Verwerk de reset token uit de URL
    async function init() {
      const params = new URLSearchParams(window.location.search);
      const hashParams = new URLSearchParams(window.location.hash.substring(1));
      const code = params.get('code');
      const accessToken = hashParams.get('access_token');

      if (code) {
        await db.auth.exchangeCodeForSession(code);
      } else if (accessToken) {
        await db.auth.setSession({
          access_token: accessToken,
          refresh_token: hashParams.get('refresh_token')
        });
      }
    }

    init();
  </script>
</body>
</html>
