<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WK Quiz 2026 – Live Scoreboard</title>
  <link rel="stylesheet" href="./css/style.css">
  <style>
    body { background: linear-gradient(160deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%); min-height: 100vh; }
    .scoreboard-hero { text-align: center; padding: 40px 20px 20px; color: white; }
    .scoreboard-hero .trophy { font-size: 60px; display: block; margin-bottom: 12px; }
    .scoreboard-hero h1 { font-size: 32px; font-weight: 800; margin-bottom: 6px; }
    .scoreboard-hero h1 span { color: #f39c12; }
    .scoreboard-hero p { color: rgba(255,255,255,0.65); font-size: 15px; }
    .scoreboard-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; overflow: hidden; margin-bottom: 20px;
    }
    .scoreboard-header {
      background: rgba(255,255,255,0.06); padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .scoreboard-header h2 { color: white; font-size: 16px; font-weight: 700; }
    .live-dot { display: flex; align-items: center; gap: 7px; color: #2ecc71; font-size: 13px; font-weight: 600; }
    .live-dot::before {
      content: ''; width: 8px; height: 8px; background: #2ecc71;
      border-radius: 50%; animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.3)} }
    .leaderboard-row {
      display: grid; grid-template-columns: 56px 1fr auto;
      align-items: center; padding: 16px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.2s;
    }
    .leaderboard-row:hover { background: rgba(255,255,255,0.04); }
    .leaderboard-row:last-child { border-bottom: none; }
    .leaderboard-row.top-1 { background: rgba(255,215,0,0.06); }
    .leaderboard-row.top-2 { background: rgba(192,192,192,0.04); }
    .leaderboard-row.top-3 { background: rgba(205,127,50,0.04); }
    .rank-nr { font-size: 15px; font-weight: 800; }
    .rank-nr.goud { color: #ffd700; }
    .rank-nr.zilver { color: #c0c0c0; }
    .rank-nr.brons { color: #cd7f32; }
    .rank-nr.normaal { color: rgba(255,255,255,0.4); }
    .deelnemer-naam { font-size: 16px; font-weight: 600; color: white; }
    .punten-display { text-align: right; }
    .punten-getal { font-size: 22px; font-weight: 800; color: #f39c12; }
    .punten-label { font-size: 11px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.5px; }
    .ronde-scores-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; padding: 20px 24px; }
    .ronde-kolom { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 14px; }
    .ronde-kolom h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: rgba(255,255,255,0.5); margin-bottom: 10px; }
    .ronde-score-rij { display: flex; justify-content: space-between; font-size: 13px; color: rgba(255,255,255,0.75); padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .ronde-score-rij:last-child { border: none; }
    .ronde-score-punten { font-weight: 700; color: #f39c12; }
    .refresh-info { text-align: center; color: rgba(255,255,255,0.35); font-size: 12px; padding: 16px; }
    .login-link { text-align: center; padding: 20px; }
    .login-link a { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; border: 1px solid rgba(255,255,255,0.15); padding: 10px 20px; border-radius: 20px; transition: 0.2s; }
    .login-link a:hover { background: rgba(255,255,255,0.08); color: white; }
    .container-score { max-width: 800px; margin: 0 auto; padding: 0 20px 40px; }
    .geen-data { text-align: center; color: rgba(255,255,255,0.4); padding: 48px 20px; font-size: 15px; }
  </style>
</head>
<body>
  <div style="background:#000;padding:0;border-bottom:3px solid #009cde"><div style="max-width:800px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:14px"><img src="./images/rsm-logo-white.png" style="height:32px"><span style="color:#888b8d;font-size:13px;font-weight:bold;border-left:1px solid rgba(255,255,255,0.2);padding-left:14px;text-transform:uppercase;letter-spacing:0.5px">WK Quiz 2026</span></div></div><div class="scoreboard-hero">
    <span class="trophy">🏆</span>
    <h1>WK <span>Quiz</span> 2026</h1>
    <p>Live scoreboard · Automatisch bijgewerkt</p>
  </div>

  <div class="container-score">
    <div class="scoreboard-card">
      <div class="scoreboard-header">
        <h2>🥇 Algemeen klassement</h2>
        <span class="live-dot">Live</span>
      </div>
      <div id="leaderboard-container">
        <div class="geen-data">⏳ Scores worden geladen...</div>
      </div>
    </div>

    <div class="scoreboard-card" id="ronde-sectie" style="display:none">
      <div class="scoreboard-header">
        <h2>📋 Scores per ronde</h2>
      </div>
      <div class="ronde-scores-grid" id="ronde-scores-container"></div>
    </div>

    <div class="refresh-info" id="refresh-info">Vernieuwd om –:––</div>
    <div class="login-link" style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <a href="./pages/wedstrijden.html">📅 Volledig speelschema</a>
      <a href="./index.html">🔐 Inloggen om te spelen</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js"></script>
  <script>
    async function laadScores() {
      const { data: deelnemers } = await db.from('profiles').select('id, display_name').eq('is_host', false).order('display_name');
      const { data: scores } = await db.from('scores').select('user_id, points_awarded, round_id, rounds(name, sort_order)').order('round_id');

      if (!deelnemers?.length) {
        document.getElementById('leaderboard-container').innerHTML = '<div class="geen-data">🏟️ Nog geen deelnemers aangemeld.</div>';
        return;
      }

      const totalen = {};
      const perRonde = {};
      deelnemers.forEach(d => { totalen[d.id] = { naam: d.display_name, punten: 0 }; });

      scores?.forEach(s => {
        if (totalen[s.user_id]) totalen[s.user_id].punten += s.points_awarded;
        const rNaam = s.rounds?.name || 'Onbekend';
        if (!perRonde[rNaam]) perRonde[rNaam] = {};
        if (!perRonde[rNaam][s.user_id]) perRonde[rNaam][s.user_id] = 0;
        perRonde[rNaam][s.user_id] += s.points_awarded;
      });

      const gesorteerd = Object.values(totalen).sort((a, b) => b.punten - a.punten);
      const container = document.getElementById('leaderboard-container');

      if (gesorteerd.every(d => d.punten === 0)) {
        container.innerHTML = '<div class="geen-data">🎯 Scores verschijnen hier zodra de host punten verdeelt.</div>';
      } else {
        container.innerHTML = gesorteerd.map((d, i) => {
          const rang = i + 1;
          const klasse = rang <= 3 ? 'top-' + rang : '';
          const medaille = rang === 1 ? '🥇' : rang === 2 ? '🥈' : rang === 3 ? '🥉' : rang;
          const rangKlasse = rang === 1 ? 'goud' : rang === 2 ? 'zilver' : rang === 3 ? 'brons' : 'normaal';
          return `<div class="leaderboard-row ${klasse}">
            <div class="rank-nr ${rangKlasse}">${medaille}</div>
            <div><div class="deelnemer-naam">${d.naam}</div></div>
            <div class="punten-display">
              <div class="punten-getal">${d.punten}</div>
              <div class="punten-label">punten</div>
            </div>
          </div>`;
        }).join('');
      }

      const rondeNamen = Object.keys(perRonde);
      if (rondeNamen.length) {
        document.getElementById('ronde-sectie').style.display = 'block';
        document.getElementById('ronde-scores-container').innerHTML = rondeNamen.map(ronde => {
          const items = Object.entries(perRonde[ronde])
            .map(([uid, pts]) => ({ naam: totalen[uid]?.naam || '?', punten: pts }))
            .sort((a, b) => b.punten - a.punten);
          return `<div class="ronde-kolom"><h4>${ronde}</h4>${items.map(d => `<div class="ronde-score-rij"><span>${d.naam}</span><span class="ronde-score-punten">${d.punten} pt</span></div>`).join('')}</div>`;
        }).join('');
      }

      const nu = new Date();
      document.getElementById('refresh-info').textContent = `Vernieuwd om ${String(nu.getHours()).padStart(2,'0')}:${String(nu.getMinutes()).padStart(2,'0')}`;
    }

    laadScores();
    db.channel('scoreboard').on('postgres_changes', { event: '*', schema: 'public', table: 'scores' }, laadScores).subscribe();
    setInterval(laadScores, 30000);
  </script>
</body>
</html>
