    // ============================================
    // RENDER FUNCTIES
    // ============================================
    function renderSpeeldag(wedstrijden, containerId) {
      const container = document.getElementById(containerId);
      let huidigeDatum = '';
      let html = '';

      wedstrijden.forEach(w => {
        if (w.datum !== huidigeDatum) {
          huidigeDatum = w.datum;
          const d = w.datum.split('/');
          const datum = new Date(2026, parseInt(d[1])-1, parseInt(d[0]));
          html += `<div class="dag-header">${datum.toLocaleDateString('nl-BE', {weekday:'long', day:'numeric', month:'long'})}</div>`;
        }
        html += `
          <div class="wedstrijd-kaart ${w.belgie ? 'belgie' : ''}">
            <div class="team-thuis">
              <div class="team-naam">${w.thuis}</div>
              <div class="team-groep">Groep ${w.groep}</div>
            </div>
            <div class="midden">
              <div class="tijd">${w.tijd}</div>
              <div class="score-display">– : –</div>
            </div>
            <div class="team-uit">
              <div class="team-naam">${w.uit}</div>
              <div class="team-groep">Groep ${w.groep}</div>
            </div>
          </div>`;
      });

      container.innerHTML = html;
    }

    function maakTeamSelect(placeholder) {
      let opts = `<option value="">${placeholder}</option>`;
      alleTeams.forEach(t => { opts += `<option value="${t}">${t}</option>`; });
      return `<select class="ko-select">${opts}</select>`;
    }

    function renderKO(wedstrijden, containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = wedstrijden.map(w => `
        <div class="ko-wedstrijd">
          <div class="ko-label">${w.label}</div>
          <div class="ko-teams">
            ${maakTeamSelect(w.placeholder1)}
            <div class="ko-vs">VS</div>
            ${maakTeamSelect(w.placeholder2)}
          </div>
          <div class="ko-datum">📅 ${w.datum} · ${w.tijd}</div>
        </div>
      `).join('');
    }

    function toonFase(fase) {
      document.querySelectorAll('.fase-inhoud').forEach(f => f.classList.remove('actief'));
      document.querySelectorAll('.fase-tab').forEach(t => t.classList.remove('actief'));
      document.getElementById('fase-' + fase).classList.add('actief');
      event.target.classList.add('actief');
    }

    // Init
    renderSpeeldag(speeldag1, 'fase-groep1');
    renderSpeeldag(speeldag2, 'fase-groep2');
    renderSpeeldag(speeldag3, 'fase-groep3');
    renderKO(ro32Wedstrijden, 'ro32-container');
    renderKO(ro16Wedstrijden, 'ro16-container');
    renderKO(kwartWedstrijden, 'kwart-container');
    renderKO(halveWedstrijden, 'halve-container');
    renderKO(finaleWedstrijden, 'finale-container');
  </script>
